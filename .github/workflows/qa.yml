name: qa

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit

  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test --tests '*Controller*' --tests '*RegistrationServiceTest'

  backend-postgres-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test --tests '*Postgres*'

  compose-smoke:
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - backend-quality
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
      - run: ./scripts/smoke-check.sh
      - if: always()
        run: docker compose logs --no-color > compose-smoke.log
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-log
          path: compose-smoke.log
      - if: always()
        run: docker compose down -v

  e2e-playwright:
    runs-on: ubuntu-latest
    needs:
      - compose-smoke
      - backend-postgres-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: docker compose up -d --build
      - run: ./scripts/smoke-check.sh
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
      - if: always()
        run: docker compose logs --no-color > compose-e2e.log
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-e2e-log
          path: compose-e2e.log
      - if: always()
        run: docker compose down -v

  nightly-regressions:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs:
      - e2e-playwright
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
      - run: ./scripts/smoke-check.sh
      - run: ./scripts/security-regression-check.sh
      - run: ./scripts/runtime-budget-check.sh
      - if: always()
        run: docker compose down -v
